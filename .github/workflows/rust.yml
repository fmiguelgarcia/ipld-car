name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Check Fmt
      run: cargo fmt --check
    - name: Build (check)
      run: cargo check --verbose
    - name: Run Ipld CAR Lib tests 
      run: cargo test -p ipld-car --verbose
